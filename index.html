<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Language of the Machine — LOT v1.0 stream visualizer. Fork-aware binary stream routing.">
<title>Language of the Machine — LOT v1.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--panel:#0c0f18;--panel2:#111520;--panel3:#161c28;
  --edge:#1a2030;--edge2:#222d40;--edge3:#2d3c55;
  --txt:#b0bcd0;--txt2:#6a7888;--dim:#3a4555;--faint:#28303d;
  --g:#00e060;--b:#00c8ff;--m:#ff4080;--gold:#d0a050;--warn:#e0b040;
  --yy:#00e060;--hb:#4080ff;--fork:#ff8020;--merge:#cc44ff;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:14px;line-height:1.5;overflow-x:hidden}

/* ── HEADER ─────────────────────────────────────────────────── */
header{padding:20px 24px 14px;border-bottom:1px solid var(--edge2);background:linear-gradient(180deg,rgba(0,224,96,.04) 0%,transparent 100%)}
.h-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:15px;font-weight:700;color:var(--g);letter-spacing:.04em}
h1 span{color:var(--txt2)}
.version{font-size:10px;color:var(--dim);border:1px solid var(--dim);padding:2px 7px;border-radius:3px}
.tagline{font-size:11px;color:var(--txt2);margin-top:6px}
.tagline b{color:var(--txt)}

/* ── STREAM CANVAS AREA ─────────────────────────────────────── */
.vis-wrap{padding:20px 24px;background:var(--panel);border-bottom:1px solid var(--edge2)}
canvas{display:block;width:100%;height:220px;border:1px solid var(--edge2);border-radius:8px;cursor:crosshair;background:#060810}

/* ── CONTROL STRIP ──────────────────────────────────────────── */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
.btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border:1px solid;border-radius:4px;cursor:pointer;transition:all .15s;letter-spacing:.04em;background:transparent}
.btn-g{border-color:var(--yy);color:var(--yy)}.btn-g:hover,.btn-g.active{background:var(--yy);color:#000}
.btn-b{border-color:var(--hb);color:var(--hb)}.btn-b:hover,.btn-b.active{background:var(--hb);color:#000}
.btn-o{border-color:var(--fork);color:var(--fork)}.btn-o:hover,.btn-o.active{background:var(--fork);color:#000}
.btn-p{border-color:var(--merge);color:var(--merge)}.btn-p:hover,.btn-p.active{background:var(--merge);color:#000}
.btn-n{border-color:var(--dim);color:var(--txt2)}.btn-n:hover{border-color:var(--edge3);color:var(--txt)}
.speed-label{font-size:10px;color:var(--dim);margin-left:auto}
#speedSlider{accent-color:var(--g);width:80px;vertical-align:middle}

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
.main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 360px);min-height:300px}
@media(max-width:800px){.main{grid-template-columns:1fr}}
.pane{border-right:1px solid var(--edge2);display:flex;flex-direction:column;overflow:hidden}
.pane:last-child{border-right:0}
.pane-hdr{padding:8px 14px;border-bottom:1px solid var(--edge);font-size:10px;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:8px;background:var(--panel2)}
.pane-hdr .tag{padding:1px 7px;border-radius:3px;font-size:10px;border:1px solid}
.tag-yy{border-color:var(--yy);color:var(--yy)}
.tag-hb{border-color:var(--hb);color:var(--hb)}
.tag-fk{border-color:var(--fork);color:var(--fork)}
.tag-mm{border-color:var(--merge);color:var(--merge)}
.pane-body{flex:1;overflow-y:auto;padding:10px 14px;font-size:12px;line-height:1.7}

/* ── STREAM LOG ─────────────────────────────────────────────── */
.log-entry{padding:3px 0;border-bottom:1px solid var(--faint);display:flex;gap:8px;align-items:flex-start}
.le-tag{flex:none;font-size:10px;min-width:44px;text-align:right}
.le-yy{color:var(--yy)}.le-hb{color:var(--hb)}.le-fk{color:var(--fork)}.le-mm{color:var(--merge)}.le-et{color:var(--m)}.le-nn{color:var(--dim)}
.le-txt{color:var(--txt2);word-break:break-all}
.le-txt.primary{color:var(--txt)}
.le-txt.hidden{color:#4060a0}
.le-txt.warn{color:var(--warn)}

/* ── FORK DECISION BOX ──────────────────────────────────────── */
.fork-box{background:var(--panel3);border:1px solid var(--fork);border-radius:8px;margin:10px 14px;padding:14px 16px;animation:pulse-fork 1s ease-in-out infinite alternate}
@keyframes pulse-fork{from{box-shadow:0 0 8px rgba(255,128,32,.2)}to{box-shadow:0 0 20px rgba(255,128,32,.5)}}
.fb-title{font-size:10px;letter-spacing:.1em;color:var(--fork);margin-bottom:10px}
.fb-path{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--edge)}
.fb-path:last-of-type{border-bottom:0}
.fb-ptag{font-size:11px;padding:2px 8px;border-radius:3px;border:1px solid;min-width:40px;text-align:center;cursor:pointer;transition:all .15s}
.fb-ptag.yy{border-color:var(--yy);color:var(--yy)}.fb-ptag.yy:hover{background:var(--yy);color:#000}
.fb-ptag.hb{border-color:var(--hb);color:var(--hb)}.fb-ptag.hb:hover{background:var(--hb);color:#000}
.fb-info{font-size:11px;color:var(--txt2);flex:1}
.fb-info b{color:var(--txt)}
.fb-preview{font-size:10px;color:var(--dim);margin-top:3px;word-break:break-all}
.fb-btns{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.fb-btn{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:3px;border:1px solid var(--edge3);color:var(--txt2);cursor:pointer;background:transparent;transition:all .15s}
.fb-btn:hover{border-color:var(--edge3);color:var(--txt)}

/* ── OUTPUT PANE ────────────────────────────────────────────── */
.output-txt{font-size:12px;color:var(--g);line-height:1.8;white-space:pre-wrap;word-break:break-all}
.output-empty{color:var(--dim);font-size:11px;text-align:center;margin-top:40px}
.stat-row{display:flex;flex-wrap:wrap;gap:12px;font-size:10px;color:var(--dim);border-top:1px solid var(--edge);padding-top:8px;margin-top:8px}
.stat-row span b{color:var(--txt2)}

/* ── TAG REFERENCE ──────────────────────────────────────────── */
.tag-ref{padding:12px 24px;border-top:1px solid var(--edge2);background:var(--panel2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tr-item{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid;letter-spacing:.04em;cursor:default}
.tr-item:hover{opacity:.7}
.tr-FLOW{border-color:#285040;color:#50a880}
.tr-FORK{border-color:#503820;color:#a87040}
.tr-HOLD{border-color:#203050;color:#5080c0}
.tr-MERGE{border-color:#402060;color:#9050c0}
.tr-RESUME{border-color:#303030;color:#707070}
.tr-TERMINAL{border-color:#502030;color:#a05070}
.tr-label{font-size:10px;color:var(--dim);margin-right:4px}

/* ── SCROLLBAR ───────────────────────────────────────────────── */
*{scrollbar-width:thin;scrollbar-color:var(--edge3) transparent}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--edge3);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="h-row">
    <h1>language<span>.of.</span>the<span>.machine</span></h1>
    <span class="version">LOT v1.0</span>
  </div>
  <div class="tagline">fork-aware stream routing · <b>y:y</b> primary · <b>h:b</b> sidecar · <b>f:k</b> lock at fork · <b>m:m</b> merge</div>
</header>

<div class="vis-wrap">
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button class="btn btn-g active" id="btnPlay">▶ STREAM</button>
    <button class="btn btn-n" id="btnReset">↺ RESET</button>
    <button class="btn btn-o" id="btnFork">⊕ INJECT FORK</button>
    <button class="btn btn-p" id="btnMerge">⊕ INJECT MERGE</button>
    <button class="btn btn-n" id="btnTrace">TRACE OFF</button>
    <span class="speed-label">SPEED <input type="range" id="speedSlider" min="1" max="10" value="5"></span>
  </div>
</div>

<div class="main">
  <div class="pane">
    <div class="pane-hdr">
      <span>STREAM LOG</span>
      <span class="tag tag-yy">y:y</span>
      <span class="tag tag-hb" id="hbIndicator" style="opacity:.3">h:b</span>
      <span style="margin-left:auto;font-size:10px" id="depthDisplay">depth: 0</span>
    </div>
    <div class="pane-body" id="streamLog"></div>
  </div>
  <div class="pane">
    <div class="pane-hdr">
      <span>YIELDED OUTPUT</span>
      <span class="tag tag-yy" id="outPathTag">y:y</span>
    </div>
    <div class="pane-body" id="outputPane">
      <div class="output-empty">awaiting stream...</div>
    </div>
  </div>
</div>

<div class="tag-ref" id="tagRef"></div>

<script>
"use strict";

/* ─────────────────────────────────────────────────────────────
   TAG VOCABULARY (trimmed for display)
───────────────────────────────────────────────────────────── */
const TAGS = {
  "y:y":["FLOW",   "YIELD",         "primary active, yield"],
  "h:b":["HOLD",   "HOLD-BRANCH",   "secondary held, standby"],
  "f:k":["FORK",   "FORK-LOCK",     "lock read head at fork"],
  "f:f":["FORK",   "FORK-OPEN",     "open a fork point"],
  "m:m":["MERGE",  "MERGE",         "attempt stream merge"],
  "m:y":["MERGE",  "MERGE-YIELD",   "merge succeeded"],
  "m:e":["MERGE",  "MERGE-ERROR",   "merge failed"],
  "h:w":["HOLD",   "HOLD-WATCH",    "hold and watch"],
  "h:r":["HOLD",   "HOLD-READY",    "held, ready to resume"],
  "n:n":["FLOW",   "NULL",          "heartbeat / no-op"],
  "r:y":["RESUME", "RESUME-YIELD",  "resume, yield primary"],
  "r:b":["RESUME", "RESUME-BRANCH", "resume, pivot to branch"],
  "w:k":["RESUME", "WAIT-LOCK",     "wait, lock head"],
  "e:t":["TERMINAL","END-TERMINATE","end, clean terminate"],
  "e:d":["TERMINAL","END-DUMP",     "end, dump buffer"],
  "t:d":["TERMINAL","TRACE-DUMP",   "trace dump state"],
  "x:x":["FLOW",   "EXIT",          "clean shutdown"],
};

/* ─────────────────────────────────────────────────────────────
   BUILD TAG REFERENCE BAR
───────────────────────────────────────────────────────────── */
(function buildTagRef() {
  const ref = document.getElementById("tagRef");
  const label = document.createElement("span");
  label.className = "tr-label";
  label.textContent = "TAGS:";
  ref.appendChild(label);
  Object.entries(TAGS).forEach(([raw, [grp, name, doc]]) => {
    const el = document.createElement("span");
    el.className = `tr-item tr-${grp}`;
    el.textContent = `[${raw}]`;
    el.title = `${name} — ${doc}`;
    ref.appendChild(el);
  });
})();

/* ─────────────────────────────────────────────────────────────
   CANVAS STREAM VISUALIZER
───────────────────────────────────────────────────────────── */
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

let W, H;
function resize() {
  const r = canvas.getBoundingClientRect();
  W = canvas.width  = Math.round(r.width * devicePixelRatio);
  H = canvas.height = Math.round(r.height * devicePixelRatio);
}
resize();
window.addEventListener("resize", resize);

// State
let running   = false;
let traceMode = false;
let speed     = 5;
let forkDepth = 0;
let activePath = "y:y";   // "y:y" or "h:b"
let particles = [];
let forkEvents = [];       // { x, frame, resolved, choice }
let rafId;

// ── PARTICLE SYSTEM ─────────────────────────────────────────
function spawnParticles(count, x0) {
  for (let i = 0; i < count; i++) {
    const isHidden = Math.random() < (forkDepth > 0 ? 0.35 : 0.08);
    particles.push({
      x: x0 ?? -5,
      y: H / 2 + (Math.random() - 0.5) * 20,
      vx: (2 + Math.random() * 3) * (speed / 5),
      vy: (Math.random() - 0.5) * 0.3,
      life: 1.0,
      decay: 0.003 + Math.random() * 0.004,
      size: 1.5 + Math.random() * 2.5,
      type: isHidden ? "h:b" : "y:y",
      char: Math.random() < 0.4 ? String.fromCharCode(48 + Math.floor(Math.random() * 10)) : "·",
      diverged: false,
      targetY: H/2,
    });
  }
}

function updateParticles() {
  const midX = W / 2;

  particles.forEach(p => {
    p.x  += p.vx * (speed / 5);
    p.life -= p.decay;

    // Fork divergence: when passing fork X, split trajectories
    forkEvents.filter(f => !f.resolved).forEach(f => {
      if (Math.abs(p.x - f.x * (W / canvas.getBoundingClientRect().width * devicePixelRatio)) < 30 && !p.diverged) {
        p.diverged = true;
        if (p.type === "h:b") {
          p.targetY = H / 2 + 55;
          p.vy = 0.8;
        } else {
          p.targetY = H / 2 - 40;
          p.vy = -0.5;
        }
      }
    });

    // Drift toward target Y
    if (p.diverged) {
      const dy = p.targetY - p.y;
      p.vy = p.vy * 0.9 + dy * 0.04;
      p.y += p.vy;
    } else {
      p.y += p.vy;
      p.vy *= 0.95;
      // Stay near center when not diverged
      p.vy += (H/2 - p.y) * 0.02;
    }
  });

  particles = particles.filter(p => p.life > 0 && p.x < W + 20);
}

// ── CANVAS DRAW ──────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = "rgba(26,32,48,.5)";
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40 * devicePixelRatio) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30 * devicePixelRatio) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Main stream line
  ctx.strokeStyle = "rgba(0,224,96,.1)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  // Fork events — draw divergence zones
  forkEvents.forEach(f => {
    const fx = f.x * devicePixelRatio;
    if (!f.resolved) {
      // Pulsing lock indicator
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.strokeStyle = `rgba(255,128,32,${0.6 + pulse * 0.4})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(fx, H * 0.1); ctx.lineTo(fx, H * 0.9); ctx.stroke();

      // Fork label
      ctx.fillStyle = `rgba(255,128,32,${0.8 + pulse * 0.2})`;
      ctx.font = `${10 * devicePixelRatio}px IBM Plex Mono, monospace`;
      ctx.fillText("f:k", fx + 4, H * 0.12);

      // Upper arm (y:y)
      ctx.strokeStyle = "rgba(0,224,96,.4)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(fx, H/2); ctx.lineTo(W * 0.8, H/2 - 45); ctx.stroke();
      ctx.fillStyle = "rgba(0,224,96,.7)";
      ctx.fillText("y:y", W * 0.8 + 4, H/2 - 50);

      // Lower arm (h:b)
      ctx.strokeStyle = "rgba(64,128,255,.4)";
      ctx.beginPath(); ctx.moveTo(fx, H/2); ctx.lineTo(W * 0.8, H/2 + 55); ctx.stroke();
      ctx.fillStyle = "rgba(64,128,255,.7)";
      ctx.fillText("h:b", W * 0.8 + 4, H/2 + 65);
      ctx.setLineDash([]);

    } else {
      // Resolved: dim marker
      ctx.strokeStyle = `rgba(0,224,96,.2)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 6]);
      ctx.beginPath(); ctx.moveTo(fx, H * 0.2); ctx.lineTo(fx, H * 0.8); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = `rgba(0,224,96,.3)`;
      ctx.font = `${9 * devicePixelRatio}px monospace`;
      ctx.fillText(`→${f.choice}`, fx + 3, H * 0.18);
    }
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life * (p.type === "h:b" ? 0.6 : 0.9);
    if (p.type === "h:b") {
      ctx.fillStyle = `rgba(64,128,255,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(0,224,96,${alpha})`;
    }
    if (traceMode) {
      ctx.font = `${8 * devicePixelRatio}px monospace`;
      ctx.fillText(p.char, p.x, p.y);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * devicePixelRatio * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Read-head indicator
  const rh = particles.length > 0 ? Math.max(...particles.map(p => p.x)) : W * 0.5;
  ctx.strokeStyle = "rgba(200,160,80,.6)";
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(rh, 0); ctx.lineTo(rh, H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "rgba(200,160,80,.8)";
  ctx.font = `${9 * devicePixelRatio}px monospace`;
  ctx.fillText("HEAD", rh + 4, 14 * devicePixelRatio);
}

// ── ANIMATION LOOP ───────────────────────────────────────────
let spawnTimer = 0;
function tick() {
  if (!running) { rafId = null; return; }
  spawnTimer++;
  if (spawnTimer % Math.max(1, Math.round(8 / speed)) === 0) {
    spawnParticles(Math.ceil(speed * 1.5));
  }
  updateParticles();
  draw();
  rafId = requestAnimationFrame(tick);
}

function startStream() {
  running = true;
  if (!rafId) rafId = requestAnimationFrame(tick);
}
function stopStream() { running = false; }

/* ─────────────────────────────────────────────────────────────
   STREAM LOG + OUTPUT
───────────────────────────────────────────────────────────── */
const streamLog  = document.getElementById("streamLog");
const outputPane = document.getElementById("outputPane");
let outputText   = "";
let streamStats  = {tags:0, dataBlocks:0, forks:0, errors:0, bytesYielded:0};
let logTimer     = null;

function addLog(tag, text, cls = "") {
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = `<span class="le-tag le-${tag.replace(":","")}">[${tag}]</span><span class="le-txt ${cls}">${escHtml(text)}</span>`;
  streamLog.appendChild(entry);
  streamLog.scrollTop = streamLog.scrollHeight;
  streamStats.tags++;
}

function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function appendOutput(text) {
  outputText += text;
  streamStats.bytesYielded += text.length;
  const div = document.querySelector(".output-empty");
  if (div) div.remove();
  let pre = outputPane.querySelector(".output-txt");
  if (!pre) { pre = document.createElement("pre"); pre.className = "output-txt"; outputPane.insertBefore(pre, outputPane.firstChild); }
  pre.textContent = outputText;
  outputPane.scrollTop = outputPane.scrollHeight;
  updateStats();
}

function updateStats() {
  let stat = outputPane.querySelector(".stat-row");
  if (!stat) { stat = document.createElement("div"); stat.className = "stat-row"; outputPane.appendChild(stat); }
  stat.innerHTML = `
    <span>tags: <b>${streamStats.tags}</b></span>
    <span>forks: <b>${streamStats.forks}</b></span>
    <span>errors: <b>${streamStats.errors}</b></span>
    <span>bytes: <b>${streamStats.bytesYielded}</b></span>
    <span>path: <b>${activePath}</b></span>`;
}

/* ─────────────────────────────────────────────────────────────
   DEMO STREAM SIMULATOR
───────────────────────────────────────────────────────────── */
const DEMO_STREAM = [
  {delay:200,  fn: () => { addLog("y:y","stream open — read head advancing", "primary"); }},
  {delay:600,  fn: () => { addLog("y:y","DATA: This is the primary stream. Visible content.", "primary"); appendOutput("This is the primary stream. Visible content. "); streamStats.dataBlocks++; }},
  {delay:1200, fn: () => { addLog("n:n","heartbeat"); }},
  {delay:1800, fn: () => { addLog("y:y","DATA: The read head is advancing along the mainline.", "primary"); appendOutput("The read head is advancing along the mainline. "); streamStats.dataBlocks++; }},
  {delay:2600, fn: () => { injectForkEvent(); }},
];

let demoRunning = false;
let demoTimers  = [];

function runDemo() {
  if (demoRunning) return;
  demoRunning = true;
  DEMO_STREAM.forEach(step => {
    const t = setTimeout(step.fn, step.delay);
    demoTimers.push(t);
  });
}

function injectForkEvent() {
  forkDepth++;
  streamStats.forks++;
  document.getElementById("depthDisplay").textContent = `depth: ${forkDepth}`;
  document.getElementById("hbIndicator").style.opacity = "1";

  // Inject fork event visually
  const forkX = Math.max(...particles.map(p => p.x)) / devicePixelRatio + 40;
  const forkId = forkEvents.length + 1;
  forkEvents.push({ x: forkX, resolved: false, choice: null });

  // Log it
  addLog("f:k", `FORK #${forkId} LOCKED — read head stopped at divergence`, "warn");

  // Insert fork decision box into stream log
  const forkBox = document.createElement("div");
  forkBox.className = "fork-box";
  forkBox.id = `fork-${forkId}`;

  const yyPayload   = "The quick brown fox jumps over the lazy dog. Main document continuation.";
  const hbPayload   = "[HIDDEN] Sidecar stream. Riding in parallel. Only visible if you choose h:b.";
  const yyPreview   = yyPayload.slice(0, 60);
  const hbPreview   = hbPayload.slice(0, 60);

  forkBox.innerHTML = `
    <div class="fb-title">⊕ FORK #${forkId} · f:k · TWO VALID CONTINUATIONS</div>
    <div class="fb-path">
      <span class="fb-ptag yy" data-fork="${forkId}" data-choice="y:y">y:y</span>
      <div class="fb-info">
        <b>YIELD</b> — primary stream active, riding mainline
        <div class="fb-preview">"${yyPreview}…"</div>
      </div>
    </div>
    <div class="fb-path">
      <span class="fb-ptag hb" data-fork="${forkId}" data-choice="h:b">h:b</span>
      <div class="fb-info">
        <b>HOLD-BRANCH</b> — sidecar on standby, not writing
        <div class="fb-preview">"${hbPreview}…"</div>
      </div>
    </div>
    <div class="fb-btns">
      <button class="fb-btn" data-fork="${forkId}" data-choice="f:d">f:d peek</button>
      <button class="fb-btn" data-fork="${forkId}" data-choice="m:m">m:m merge</button>
    </div>`;

  streamLog.appendChild(forkBox);
  streamLog.scrollTop = streamLog.scrollHeight;

  // Attach click handlers
  forkBox.querySelectorAll("[data-choice]").forEach(el => {
    el.addEventListener("click", () => {
      const choice = el.dataset.choice;
      resolveFork(forkId, choice, forkBox, yyPayload, hbPayload);
    });
  });
}

function resolveFork(id, choice, box, yyData, hbData) {
  const fev = forkEvents[id - 1];

  if (choice === "f:d") {
    // Peek — don't resolve
    addLog("f:d", "FORK DUMP — inspecting headers without choosing");
    addLog("f:d", `  [y:y] CRC:628e1b76  ${yyData.length} bytes  "${yyData.slice(0,40)}"`);
    addLog("f:d", `  [h:b] CRC:e99dceaf  ${hbData.length} bytes  "${hbData.slice(0,40)}"`);
    return;
  }

  if (choice === "m:m") {
    addLog("m:m", "attempting merge of both streams…");
    setTimeout(() => {
      addLog("m:e", "streams are incompatible — different payloads. Choose manually: y:y | h:b");
    }, 400);
    return;
  }

  // Actual choice
  fev.resolved = true;
  fev.choice   = choice;
  forkDepth--;
  document.getElementById("depthDisplay").textContent = `depth: ${forkDepth}`;
  if (forkDepth === 0) document.getElementById("hbIndicator").style.opacity = "0.3";

  activePath = choice;
  document.getElementById("outPathTag").textContent = choice;
  document.getElementById("outPathTag").className = `tag tag-${choice.replace(":","")}`;

  const chosen = choice === "y:y" ? yyData : hbData;
  const parked = choice === "y:y" ? "h:b" : "y:y";

  box.style.borderColor = choice === "y:y" ? "var(--yy)" : "var(--hb)";
  box.style.animation = "none";

  addLog(choice, `→ CHOSE [${choice}] — following ${choice === "y:y" ? "primary" : "sidecar"} stream`, choice === "y:y" ? "primary" : "hidden");
  addLog(parked, `  [${parked}] parked in sidecar buffer — not discarded`, "hidden");
  addLog("r:y",  "resume — read head advancing");

  setTimeout(() => {
    appendOutput(chosen + " ");
    streamStats.dataBlocks++;
    addLog(choice, `DATA: ${chosen.slice(0,50)}…`, choice === "y:y" ? "primary" : "hidden");
  }, 400);

  setTimeout(() => {
    addLog("y:y", "DATA: After the fork resolves, the stream continues.", "primary");
    appendOutput("After the fork resolves, the stream continues.");
    addLog("e:t", "stream end — clean terminate");
  }, 1200);
}

/* ─────────────────────────────────────────────────────────────
   CONTROLS
───────────────────────────────────────────────────────────── */
const btnPlay  = document.getElementById("btnPlay");
const btnReset = document.getElementById("btnReset");
const btnFork  = document.getElementById("btnFork");
const btnMerge = document.getElementById("btnMerge");
const btnTrace = document.getElementById("btnTrace");
const slider   = document.getElementById("speedSlider");

btnPlay.addEventListener("click", () => {
  if (running) {
    stopStream();
    btnPlay.textContent = "▶ STREAM";
    btnPlay.classList.remove("active");
  } else {
    startStream();
    btnPlay.textContent = "■ STOP";
    btnPlay.classList.add("active");
    runDemo();
  }
});

btnReset.addEventListener("click", () => {
  stopStream();
  particles   = [];
  forkEvents  = [];
  forkDepth   = 0;
  activePath  = "y:y";
  outputText  = "";
  demoRunning = false;
  demoTimers.forEach(clearTimeout);
  demoTimers = [];
  streamStats = {tags:0, dataBlocks:0, forks:0, errors:0, bytesYielded:0};
  streamLog.innerHTML  = "";
  outputPane.innerHTML = '<div class="output-empty">awaiting stream...</div>';
  document.getElementById("depthDisplay").textContent = "depth: 0";
  document.getElementById("hbIndicator").style.opacity = "0.3";
  document.getElementById("outPathTag").textContent = "y:y";
  document.getElementById("outPathTag").className = "tag tag-yy";
  btnPlay.textContent = "▶ STREAM";
  btnPlay.classList.remove("active");
  running = false;
  draw();
});

btnFork.addEventListener("click", () => {
  if (!running) startStream();
  injectForkEvent();
});

btnMerge.addEventListener("click", () => {
  addLog("m:m", "INJECT MERGE — attempting to merge active + sidecar");
  setTimeout(() => addLog("m:y", "merge succeeded — streams were compatible (identical payload)"), 500);
  appendOutput(" [merged] ");
});

btnTrace.addEventListener("click", () => {
  traceMode = !traceMode;
  btnTrace.textContent = traceMode ? "TRACE ON" : "TRACE OFF";
  btnTrace.classList.toggle("active", traceMode);
});

slider.addEventListener("input", () => {
  speed = parseInt(slider.value);
  particles.forEach(p => { p.vx = (2 + Math.random() * 3) * (speed / 5); });
});

/* ─────────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────────── */
draw();
// Auto-start on load with a small delay
setTimeout(() => {
  startStream();
  btnPlay.textContent = "■ STOP";
  btnPlay.classList.add("active");
  runDemo();
}, 600);
</script>
</body>
</html>
